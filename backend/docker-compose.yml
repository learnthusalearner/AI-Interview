version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tutor_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: tutor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tutor_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: tutor_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/tutor_db?schema=public
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORS_ORIGIN=*
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
